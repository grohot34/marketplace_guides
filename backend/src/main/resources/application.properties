spring.application.name=marketplace-backend


server.port=8080
server.servlet.context-path=/api

spring.datasource.url=jdbc:postgresql://localhost:5432/marketplace_db
spring.datasource.username=postgres
spring.datasource.password=postgrespassword
spring.datasource.driver-class-name=org.postgresql.Driver
# Ждать подключения к БД при старте (например в Docker)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=60000


spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.group-id=home-services-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*


kafka.topic.order-events=order-events
kafka.topic.notifications=notifications


jwt.secret=mySecretKey123456789012345678901234567890123456789012345678901234567890
jwt.expiration=86400000


management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.base-path=/actuator
# Метрики HTTP для проверки времени отклика (p95 < 200 ms)
management.metrics.distribution.percentiles-histogram.http.server.requests=true


springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


logging.level.root=INFO
logging.level.com.example.backend=DEBUG


app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:3001
app.oauth2.frontend-redirect-uri=http://localhost:3001/auth/callback

# Google OAuth2 — в Google Console (APIs & Services → Credentials → OAuth 2.0 Client)
# в «Authorized redirect URIs» добавь ТОЧНО такую же строку, как ниже (без лишних слэшей):
# Задай GOOGLE_OAUTH_CLIENT_ID и GOOGLE_OAUTH_CLIENT_SECRET (Credentials в Google Cloud Console)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_OAUTH_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
# Redirect URI — должен ПОСИМВОЛЬНО совпадать с URI в Google Console
# Локально (backend на 8080): http://localhost:8080/api/login/oauth2/code/google
# Через Docker (вход с localhost:3000): http://localhost:3000/api/login/oauth2/code/google
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_OAUTH_REDIRECT_URI:http://localhost:8080/api/login/oauth2/code/google}

# Stripe (оплата) — задай STRIPE_SECRET_KEY и STRIPE_WEBHOOK_SECRET в переменных окружения
stripe.api.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
# URL фронта для success/cancel (без слэша в конце)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3001}
# Курс BYN → EUR для Stripe (оплата в евро, на сайте цены в BYN). 1 BYN ≈ 0.29 EUR
stripe.byn-to-eur-rate=${STRIPE_BYN_TO_EUR_RATE:0.29}
